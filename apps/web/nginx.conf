server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path serves index.html so client-side routing
    # (react-router) handles it. No /api proxying here — that's the host
    # Nginx's job (see DEPLOY.md), this container only ever serves static assets.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never let a proxy/browser cache serve a stale service worker.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
