services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: weave
      POSTGRES_PASSWORD: weave
      POSTGRES_DB: weave
    ports:
      - "5433:5432"
    volumes:
      - weave_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weave"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  weave_pgdata:
